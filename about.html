 <!-- Navbar -->
<header class="bg-white/90 backdrop-blur-md shadow-md dark:bg-gray-900/80 fixed top-0 left-0 w-full z-50">
  <div class="container mx-auto px-4 py-3 flex items-center justify-between gap-3">
    <div class="text-xl font-bold text-gray-900 dark:text-white">sofi360tools</div>

    <!-- Search Bar -->
        <div class="mb-6 md:mb-8">
            <div class="relative max-w-md mx-auto">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                <input 
                    type="text" 
                    id="toolSearch" 
                    placeholder="Search tools..."
                    class="w-full pl-10 pr-4 py-3 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-full shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm placeholder-gray-400 dark:placeholder-gray-300 text-gray-900 dark:text-gray-100 transition-all"
                >
                <button onclick="clearSearch()" id="clearSearch" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 transition-colors hidden">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
        </div>

    <button id="menuToggle" class="md:hidden text-gray-700 dark:text-gray-300 focus:outline-none">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>

    <nav class="hidden md:flex gap-x-4 text-sm font-medium text-gray-700 dark:text-gray-100">
      <a href="#about-us" class="hover:text-blue-600 dark:hover:text-blue-400">About</a>
      <a href="#privacy-policy" class="hover:text-blue-600 dark:hover:text-blue-400">Privacy</a>
      <a href="#terms-of-service" class="hover:text-blue-600 dark:hover:text-blue-400">Terms</a>
      <a href="#contact-us" class="hover:text-blue-600 dark:hover:text-blue-400">Contact</a>
      <button class="bg-blue-600 text-white px-3 py-1 rounded hover:bg-blue-700 transition" data-modal="loginModal">Login</button>
      <button class="bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700 transition" data-modal="signupModal">Sign Up</button>
      <a href="#logout" class="bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700 transition">Logout</a>
    </nav>
  </div>
</header>

<!-- Hamburger Slide-In Menu -->
<div id="sideMenu" class="fixed top-0 left-0 h-full w-2/3 max-w-sm bg-white/80 dark:bg-gray-900/80 backdrop-blur-md z-50 transform -translate-x-full transition-transform duration-300 ease-in-out shadow-lg overflow-y-auto">
  <div class="flex justify-end p-4">
    <button id="closeMenu" class="text-gray-700 dark:text-gray-300">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>
  <div class="px-4 pb-6 space-y-3 text-sm">
    <a href="#about-us" class="block p-3 rounded-lg bg-blue-500/5 dark:bg-blue-400/5 text-gray-900 dark:text-white">About</a>
    <a href="#privacy-policy" class="block p-3 rounded-lg bg-blue-500/5 dark:bg-blue-400/5 text-gray-900 dark:text-white">Privacy</a>
    <a href="#terms-of-service" class="block p-3 rounded-lg bg-blue-500/5 dark:bg-blue-400/5 text-gray-900 dark:text-white">Terms</a>
    <a href="#contact-us" class="block p-3 rounded-lg bg-blue-500/5 dark:bg-blue-400/5 text-gray-900 dark:text-white">Contact</a>
    <button class="block w-full p-3 rounded-lg bg-blue-600 text-white text-center hover:bg-blue-700 transition" data-modal="loginModal">Login</button>
    <button class="block w-full p-3 rounded-lg bg-green-600 text-white text-center hover:bg-green-700 transition" data-modal="signupModal">Sign Up</button>
    <a href="#logout" class="block p-3 rounded-lg bg-red-600 text-white text-center hover:bg-red-700 transition">Logout</a>
  </div>
</div>

<!-- Modal Overlay -->
<div id="modalOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
  <!-- Login Modal -->
  <div id="loginModal" class="hidden bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 p-6 rounded-lg shadow-lg w-full max-w-md relative">
    <button class="absolute top-2 right-2 text-gray-600 dark:text-gray-300" onclick="closeModal()">✖</button>
    <h2 class="text-xl font-semibold mb-4">Login</h2>
    <input id="loginEmail" type="email" placeholder="Email" class="w-full p-2 rounded border mb-3 dark:bg-gray-700 dark:border-gray-600">
    <input id="loginPassword" type="password" placeholder="Password" class="w-full p-2 rounded border mb-4 dark:bg-gray-700 dark:border-gray-600">
    <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded">Login</button>
  </div>

  <!-- Signup Modal -->
  <div id="signupModal" class="hidden bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 p-6 rounded-lg shadow-lg w-full max-w-md relative">
    <button class="absolute top-2 right-2 text-gray-600 dark:text-gray-300" onclick="closeModal()">✖</button>
    <h2 class="text-xl font-semibold mb-4">Sign Up</h2>
    <input id="signupName" type="text" placeholder="Name" class="w-full p-2 rounded border mb-3 dark:bg-gray-700 dark:border-gray-600">
    <input id="signupEmail" type="email" placeholder="Email" class="w-full p-2 rounded border mb-3 dark:bg-gray-700 dark:border-gray-600">
    <input id="signupPassword" type="password" placeholder="Password" class="w-full p-2 rounded border mb-4 dark:bg-gray-700 dark:border-gray-600">
    <button onclick="handleSignup()" class="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded">Sign Up</button>
  </div>
</div>

<script>
  const menuToggle = document.getElementById('menuToggle');
  const closeMenu = document.getElementById('closeMenu');
  const sideMenu = document.getElementById('sideMenu');
  const modalOverlay = document.getElementById('modalOverlay');
  const modalButtons = document.querySelectorAll('[data-modal]');
  const modals = document.querySelectorAll('#modalOverlay > div');

  menuToggle.addEventListener('click', () => sideMenu.classList.remove('-translate-x-full'));
  closeMenu.addEventListener('click', () => sideMenu.classList.add('-translate-x-full'));

  modalButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      const target = document.getElementById(btn.getAttribute('data-modal'));
      modalOverlay.classList.remove('hidden');
      modalOverlay.classList.add('flex');
      modals.forEach(modal => modal.classList.add('hidden'));
      target.classList.remove('hidden');
    });
  });

  function closeModal() {
    modalOverlay.classList.add('hidden');
    modalOverlay.classList.remove('flex');
    modals.forEach(modal => modal.classList.add('hidden'));
  }

  modalOverlay.addEventListener('click', (e) => {
    if (e.target === modalOverlay) closeModal();
  });

  function handleLogin() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    if (email && password) {
      alert(`Logged in as ${email}`);
      closeModal();
    } else {
      alert("Please enter email and password.");
    }
  }

  function handleSignup() {
    const name = document.getElementById('signupName').value;
    const email = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPassword').value;
    if (name && email && password) {
      alert(`Signed up as ${name}`);
      closeModal();
    } else {
      alert("Please fill out all fields.");
    }
  }
</script>
